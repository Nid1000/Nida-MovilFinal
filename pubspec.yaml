name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Dependencias externas
  shared_preferences: ^2.2.0
  http: ^1.1.0
  dio: ^5.9.0
  go_router: ^13.2.0
  cupertino_icons: ^1.0.8
  pusher_channels_flutter: ^2.6.0
  flutter_local_notifications: ^17.2.3
  flutter_secure_storage: ^10.3.1
  geolocator: ^13.0.2
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/logos/  # Asegúrate de que la carpeta 'logos' existe en el directorio 'assets'

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logos/delicias.png"
  min_sdk_android: 21
